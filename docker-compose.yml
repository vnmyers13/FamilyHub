# FamilyHub — Docker Compose
# Version: 1.02
# Date: 2026-04-30
# Services: api (FastAPI), web (React/Vite + nginx), caddy (HTTPS reverse proxy)

services:
  # ── API Backend ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.02"
    container_name: familyhub-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Frontend Web App ─────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: familyhub-web
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Caddy Reverse Proxy (HTTPS) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: familyhub-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

# Network segmentation: frontend↔backend isolation
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
